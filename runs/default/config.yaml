seed: 42
data:
  train_dir: /home/numair/Desktop/IISc/misc/skylark_assn/GCP_Assignment_Datasets/train_dataset
  test_dir: /home/numair/Desktop/IISc/misc/skylark_assn/GCP_Assignment_Datasets/test_dataset
  annotations: /home/numair/Desktop/IISc/misc/skylark_assn/GCP_Assignment_Datasets/train_dataset/gcp_marks.json
  val_split: 0.15
  classes:
  - Cross
  - Square
  - L-Shape
  image_size:
  - 1024
  - 576
  heatmap_sigma: 3.0
model:
  arch: Unet
  encoder_name: efficientnet-b0
  encoder_weights: imagenet
  in_channels: 3
  num_classes: 3
train:
  epochs: 60
  batch_size: 4
  num_workers: 4
  lr: 0.0003
  weight_decay: 0.0001
  optimizer: adamw
  scheduler: cosine
  warmup_epochs: 2
  amp: true
  grad_clip: 1.0
  loss:
    type: gaussian_focal
    alpha: 2.0
    beta: 4.0
  output_dir: runs/default
  save_every: 5
  log_every: 20
  val_every: 1
  early_stopping_patience: 10
infer:
  peak_window: 5
  tta: true
  batch_size: 4
